<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Mouse — 3D Viewer</title>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8WRXGV06E1"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      gtag('js', new Date());
      gtag('config', 'G-8WRXGV06E1');
    </script>

    <!-- model-viewer web component (loads as an ES module) -->
    <script type="module"
      src="https://cdn.jsdelivr.net/npm/@google/model-viewer@4.0.0/dist/model-viewer.min.js"></script>

    <style>
      html, body { margin: 0; height: 100%; }
      body {
        background: radial-gradient(120% 120% at 50% 20%, #39435a, #1c2230 60%, #10141d);
        color: #d9d2ee; font: 14px/1.5 system-ui, -apple-system, sans-serif;
        overflow: hidden;
      }
      model-viewer {
        width: 100vw; height: 100vh;
        --poster-color: transparent;
        --progress-bar-color: #7fb4e6;
      }

      /* Title */
      #title {
        position: fixed; top: 18px; left: 0; right: 0; text-align: center;
        z-index: 10; pointer-events: none;
        font-weight: 600; letter-spacing: .04em; color: #efeaff;
        text-shadow: 0 2px 10px rgba(0,0,0,.5);
      }
      #title small { display: block; font-weight: 400; opacity: .6; letter-spacing: .12em;
        text-transform: uppercase; font-size: 11px; margin-top: 2px; }

      /* Hint card */
      #help {
        position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
        z-index: 10; padding: 9px 16px; border-radius: 999px;
        background: rgba(12,8,24,.6); border: 1px solid rgba(120,90,200,.35);
        backdrop-filter: blur(8px); white-space: nowrap; font-size: 12.5px;
        opacity: .9; transition: opacity .4s; pointer-events: none;
      }
      #help.hidden { opacity: 0; }

      /* Buttons */
      .btn-row { position: fixed; top: 16px; right: 16px; z-index: 10; display: flex; gap: 8px; }
      .btn {
        appearance: none; border: 1px solid rgba(120,90,200,.45);
        background: rgba(20,14,38,.55); color: #d9d2ee; cursor: pointer;
        border-radius: 10px; padding: 8px 12px; font: inherit; font-size: 13px;
        backdrop-filter: blur(8px);
      }
      .btn:hover { background: rgba(40,28,72,.7); }
      .btn[aria-pressed="true"] { background: rgba(127,180,230,.18); border-color: rgba(127,180,230,.6); color: #cfe4f8; }

      /* The AR button model-viewer slots in */
      #ar-btn {
        position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
        background: rgba(127,180,230,.92); color: #07182b; border: none;
        padding: 10px 18px; border-radius: 999px; font-weight: 600; cursor: pointer;
        box-shadow: 0 6px 20px rgba(0,0,0,.4); display: none;
      }
    </style>
  </head>

  <body>
    <div id="title">Mouse<small>drag to rotate</small></div>

    <div class="btn-row">
      <button class="btn" id="spin" aria-pressed="true">Auto-rotate</button>
      <button class="btn" id="reset">Reset view</button>
    </div>

    <model-viewer
      id="mv"
      src="mouse_viewer.glb"
      alt="A cartoon mouse in a coat holding a potted flower"
      camera-controls
      touch-action="pan-y"
      auto-rotate
      auto-rotate-delay="600"
      rotation-per-second="18deg"
      interaction-prompt="none"
      environment-image="studio_env.hdr"
      exposure="1.0"
      shadow-intensity="0.9"
      shadow-softness="0.85"
      camera-orbit="-20deg 82deg auto"
      min-camera-orbit="auto auto 50%"
      max-camera-orbit="auto auto 200%"
      ar
      ar-modes="webxr scene-viewer quick-look">

      <button id="ar-btn" slot="ar-button">👁  View in your space</button>
    </model-viewer>

    <div id="help">Drag to rotate · scroll / pinch to zoom · right-drag to pan</div>

    <script>
      const mv    = document.getElementById('mv');
      const spin  = document.getElementById('spin');
      const reset = document.getElementById('reset');
      const help  = document.getElementById('help');
      const arBtn = document.getElementById('ar-btn');

      // Toggle auto-rotate
      spin.addEventListener('click', () => {
        const on = mv.hasAttribute('auto-rotate');
        if (on) { mv.removeAttribute('auto-rotate'); spin.setAttribute('aria-pressed', 'false'); }
        else    { mv.setAttribute('auto-rotate', '');  spin.setAttribute('aria-pressed', 'true'); }
      });

      // Reset to the framing the page loaded with
      reset.addEventListener('click', () => {
        mv.cameraOrbit = '-20deg 82deg auto';
        mv.cameraTarget = 'auto auto auto';
        mv.fieldOfView = 'auto';
        mv.resetTurntableRotation();
      });

      // Fade the hint out after the first interaction
      const hideHint = () => help.classList.add('hidden');
      mv.addEventListener('camera-change', e => {
        if (e.detail.source === 'user-interaction') hideHint();
      }, { once: true });
      setTimeout(hideHint, 6000);

      // Only show the AR button when the device actually supports AR
      mv.addEventListener('load', () => {
        if (mv.canActivateAR) arBtn.style.display = 'block';
      });
    </script>
  </body>
</html>
