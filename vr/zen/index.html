<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Zen Garden — WebXR Walkthrough</title>
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-blink-controls@0.4.3/dist/aframe-blink-controls.min.js"></script>

    <!-- On-screen joystick for phones (inert on desktop / in VR). Registers before the scene parses. -->
    <script>
    AFRAME.registerComponent('touch-move', {
      schema: { speed: { default: 2.6 }, cameraEl: { type: 'selector', default: '#camera' } },
      init: function () {
        this.vec = { x: 0, y: 0 }; this.dragging = false;
        this._fwd = new THREE.Vector3(); this._right = new THREE.Vector3(); this._q = new THREE.Quaternion();
        if (!(('ontouchstart' in window) || navigator.maxTouchPoints > 0)) return; // desktop keeps WASD
        var base = document.createElement('div'); base.className = 'tm-joy-base';
        var thumb = document.createElement('div'); thumb.className = 'tm-joy-thumb';
        base.appendChild(thumb); document.body.appendChild(base); this.base = base;
        var self = this, radius = 55;
        function setFromTouch(t) {
          var r = base.getBoundingClientRect();
          var dx = t.clientX - (r.left + r.width / 2), dy = t.clientY - (r.top + r.height / 2);
          var c = Math.min(Math.hypot(dx, dy), radius), a = Math.atan2(dy, dx);
          var tx = Math.cos(a) * c, ty = Math.sin(a) * c;
          thumb.style.transform = 'translate(' + tx + 'px,' + ty + 'px)';
          self.vec.x = tx / radius; self.vec.y = -ty / radius;
        }
        function reset() { self.dragging = false; self.vec.x = 0; self.vec.y = 0; thumb.style.transform = 'translate(0,0)'; }
        base.addEventListener('touchstart', function (e) { self.dragging = true; setFromTouch(e.changedTouches[0]); e.preventDefault(); e.stopPropagation(); }, { passive: false });
        base.addEventListener('touchmove', function (e) { if (self.dragging) { setFromTouch(e.changedTouches[0]); e.preventDefault(); e.stopPropagation(); } }, { passive: false });
        base.addEventListener('touchend', function (e) { reset(); e.preventDefault(); e.stopPropagation(); }, { passive: false });
        base.addEventListener('touchcancel', reset, { passive: false });
        this.el.sceneEl.addEventListener('enter-vr', function () { base.style.display = 'none'; });
        this.el.sceneEl.addEventListener('exit-vr', function () { base.style.display = 'flex'; });
      },
      tick: function (time, dt) {
        if (!this.dragging || (this.vec.x === 0 && this.vec.y === 0)) return;
        var cam = this.data.cameraEl; if (!cam) return;
        cam.object3D.getWorldQuaternion(this._q);
        this._fwd.set(0, 0, -1).applyQuaternion(this._q); this._fwd.y = 0; this._fwd.normalize();
        this._right.set(1, 0, 0).applyQuaternion(this._q); this._right.y = 0; this._right.normalize();
        var d = this.data.speed * (dt / 1000), p = this.el.object3D.position;
        p.addScaledVector(this._fwd, this.vec.y * d); p.addScaledVector(this._right, this.vec.x * d);
      },
      remove: function () { if (this.base && this.base.parentNode) this.base.parentNode.removeChild(this.base); }
    });
    </script>

    <style>
      html,body{margin:0;height:100%;background:#caa276}
      #help{position:fixed;left:12px;bottom:12px;z-index:9999;max-width:340px;padding:12px 14px;
        border-radius:10px;background:rgba(40,26,14,.72);color:#f3e7d4;
        font:13px/1.5 system-ui,sans-serif;border:1px solid rgba(200,150,90,.4);
        backdrop-filter:blur(6px);pointer-events:none}
      .tm-joy-base { position: fixed; left: 22px; bottom: 22px; width: 120px; height: 120px;
        border-radius: 50%; z-index: 10000; background: rgba(40,26,14,.45);
        border: 2px solid rgba(200,150,90,.5); display: flex; align-items: center;
        justify-content: center; touch-action: none; user-select: none; -webkit-user-select: none; }
      .tm-joy-thumb { width: 54px; height: 54px; border-radius: 50%;
        background: rgba(255,196,120,.75); box-shadow: 0 0 14px rgba(255,180,90,.6); pointer-events: none; }
    </style>
  </head>
  <body>
    <div id="help">Desktop: WASD + drag to look. Phone: drag the joystick to walk, drag the screen to look. VR: Enter VR, point at the ground, pull the trigger to teleport.</div>

    <a-scene
      background="color: #caa276"
      fog="type: exponential; color: #caa276; density: 0.011"
      renderer="colorManagement: true; toneMapping: ACESFilmic; exposure: 1.0; antialias: true; sortTransparentObjects: true"
      loading-screen="backgroundColor: #caa276; dotsColor: #5a3c1e">

      <a-assets>
        <a-asset-item id="model" src="zen_garden_webxr.glb"></a-asset-item>
      </a-assets>

      <!-- Adding our own lights disables A-Frame's default directional+ambient.
           The GLB carries its own Sun + 16 lantern point lights (KHR_lights_punctual);
           this hemisphere fill just lifts the shadows so nothing reads pure black. -->
      <a-entity light="type: hemisphere; color: #e7c9a0; groundColor: #2a2418; intensity: 0.55"></a-entity>

      <a-entity gltf-model="#model" position="0 0 0"></a-entity>

      <!-- Invisible teleport target covering the garden footprint. Keep visible:true (opacity 0)
           so the raycaster still hits it. Centered on the garden, radius covers the walls. -->
      <a-circle class="teleport-floor" radius="55" rotation="-90 0 0" position="0 0.02 -2"
                material="shader: flat; opacity: 0; transparent: true"></a-circle>

      <!-- Spawn: Blender (0, -22, eye) = just south of the torii (Y=-19), on the court paving,
           facing +Y toward the temple. Blender +Y maps to A-Frame -Z, which is the camera's
           default forward, so no rig rotation is needed. -->
      <a-entity id="rig" position="0 0 22" touch-move="speed: 2.6">
        <a-entity id="camera" camera position="0 1.6 0"
                  look-controls="pointerLockEnabled: false"
                  wasd-controls="acceleration: 28; fly: false"></a-entity>
        <a-entity laser-controls="hand: left"  raycaster="objects: .teleport-floor; far: 40"
                  blink-controls="cameraRig: #rig; teleportOrigin: #camera; collisionEntities: .teleport-floor"></a-entity>
        <a-entity laser-controls="hand: right" raycaster="objects: .teleport-floor; far: 40"
                  blink-controls="cameraRig: #rig; teleportOrigin: #camera; collisionEntities: .teleport-floor"></a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
